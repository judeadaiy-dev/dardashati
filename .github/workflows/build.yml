name: Build Flutter APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ──────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Java 17 (required for AGP 8+) ───
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 3. Setup Flutter (stable, matches SDK >=3.0.0) ──
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: 'stable'
          cache: true

      # ── 4. Cache pub packages ─────────────────────
      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ${{ env.PUB_CACHE }}
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # ── 5. Create missing asset dirs ──────────────
      - name: Create asset directories
        run: |
          mkdir -p assets/images
          mkdir -p assets/icons
          # Create placeholder files so Flutter doesn't fail
          touch assets/images/.gitkeep
          touch assets/icons/.gitkeep

      # ── 6. Get dependencies ───────────────────────
      - name: Flutter pub get
        run: flutter pub get

      # ── 7. Analyze code (warnings only, not fail) ─
      - name: Flutter analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      # ── 8. Build release APK ─────────────────────
      - name: Build APK (release)
        run: flutter build apk --release --no-shrink

      # ── 9. Upload APK as artifact ─────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dardashati-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      # ── 10. Print APK size ────────────────────────
      - name: Print APK info
        run: |
          echo "✅ Build completed!"
          ls -lh build/app/outputs/flutter-apk/
