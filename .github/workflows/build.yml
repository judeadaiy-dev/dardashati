name: Build Flutter APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: 'stable'
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ${{ env.PUB_CACHE }}
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Create asset directories
        run: |
          mkdir -p assets/images
          mkdir -p assets/icons
          touch assets/images/.gitkeep
          touch assets/icons/.gitkeep

      - name: Setup Android resources
        run: |
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi

          cat > android/app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="LaunchTheme" parent="@android:style/Theme.Black.NoTitleBar">
                  <item name="android:windowBackground">@android:color/black</item>
              </style>
              <style name="NormalTheme" parent="@android:style/Theme.Black.NoTitleBar">
                  <item name="android:windowBackground">@android:color/black</item>
              </style>
          </resources>
          EOF

          python3 -c "
          import struct, zlib
          def png(w,h,color):
              raw=b''.join(b'\x00'+bytes([color[0],color[1],color[2],255]*w) for _ in range(h))
              def chunk(t,d):
                  c=zlib.crc32(t+d)&0xffffffff
                  return struct.pack('>I',len(d))+t+d+struct.pack('>I',c)
              return b'\x89PNG\r\n\x1a\n'+chunk(b'IHDR',struct.pack('>IIBBBBB',w,h,8,2,0,0,0))+chunk(b'IDAT',zlib.compress(raw))+chunk(b'IEND',b'')
          open('ic_launcher.png','wb').write(png(192,192,(89,102,177)))
          "

          cp ic_launcher.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp ic_launcher.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp ic_launcher.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp ic_launcher.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp ic_launcher.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      - name: Build APK (release)
        run: flutter build apk --release --no-shrink

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dardashati-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Print APK info
        run: |
          echo "✅ Build completed!"
          ls -lh build/app/outputs/flutter-apk/
