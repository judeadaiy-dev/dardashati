name: dardashati
description: A modern glassmorphism chat app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.3.4
  google_sign_in: ^6.2.1
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  timeago: ^3.6.1
  flutter_animate: ^4.5.0
  audioplayers: ^5.2.1
  record: ^5.0.4
  permission_handler: ^11.3.0
  uuid: ^4.3.3
  shimmer: ^3.0.0
  badges: ^3.1.2
  flutter_local_notifications: ^17.1.2
  intl: ^0.19.0
  file_picker: ^8.0.3
  path_provider: ^2.1.2
  dart_emoji: ^0.4.2
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
